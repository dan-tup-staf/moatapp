# Render Blueprint — MOATION (darmowy hosting)
#
# Baza Postgres NIE jest tutaj definiowana celowo: darmowy Postgres na Render
# kasuje się po ~30 dniach. Zamiast tego użyj darmowego Postgresa na Neon
# (https://neon.tech) i wklej jego connection string do zmiennej DATABASE_URL
# usługi `moation-api`. Reszta (API + frontend) stoi za darmo na Render.
#
# Jak wdrożyć:
#   1. Załóż darmową bazę na Neon, skopiuj "connection string".
#   2. Na Render: New → Blueprint → podłącz to repo (branch z tą zmianą).
#   3. Render zapyta o sekrety oznaczone `sync: false`:
#        - DATABASE_URL      → wklej URL z Neona
#        - GEMINI_API_KEY    → DARMOWY klucz z https://aistudio.google.com
#                              (zasila ICP + kanały web_search za 0 zł)
#        - ANTHROPIC_API_KEY → płatna alternatywa (zostaw puste, jeśli używasz Gemini)
#   4. Deploy. Frontend sam podepnie się pod API (NEXT_PUBLIC_API_URL).
#
# Uwaga: darmowe usługi usypiają po 15 min bezczynności (zimny start ~1 min).

services:
  - type: web
    name: moation-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    # Migracje + start serwera są w CMD Dockerfile (Render nie owija polecenia
    # w shell, więc trzymamy to po stronie obrazu). $PORT wstrzykuje Render.
    envVars:
      - key: DATABASE_URL
        sync: false # wklej connection string z Neon (postgresql://...)
      - key: GEMINI_API_KEY
        sync: false # DARMOWY (aistudio.google.com) — zasila ICP + web_search
      - key: ANTHROPIC_API_KEY
        sync: false # płatna alternatywa; puste, jeśli używasz Gemini
      # --- Wysyłka maili (Milestone 1) — skrzynka SMTP ---
      - key: SMTP_HOST
        sync: false # np. smtp.gmail.com
      - key: SMTP_PORT
        sync: false # 587 (starttls) lub 465 (tls)
      - key: SMTP_USERNAME
        sync: false # login skrzynki
      - key: SMTP_PASSWORD
        sync: false # hasło / App Password
      - key: SMTP_STARTTLS
        sync: false # "true" dla portu 587 (Gmail/Workspace)
      - key: SMTP_USE_TLS
        sync: false # "true" dla portu 465
      - key: SMTP_FROM_EMAIL
        sync: false # adres nadawcy (zwykle = login)
      - key: SMTP_FROM_NAME
        sync: false # nazwa nadawcy (np. Daniel z Staffly)
      - key: SMTP_DAILY_LIMIT
        value: "50" # dzienny limit bezpieczeństwa (0 = bez limitu)
      # --- Scheduler (auto-wysyłka należnych maili) ---
      - key: SCHEDULER_ENABLED
        value: "true" # wbudowany tick co minutę (działa, gdy serwis nie śpi)
      - key: SCHEDULER_RUN_SIGNALS
        value: "false" # auto-scraping sygnałów (zużywa limit AI) — domyślnie off
      - key: CRON_SECRET
        sync: false # sekret do POST /api/v1/tick (dla darmowego zewnętrznego crona)
      - key: TRACKING_BASE_URL
        value: https://moation-api.onrender.com # publiczny adres API dla pixela otwarć
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOW_ALL
        value: "true"
      - key: ENVIRONMENT
        value: production

  - type: web
    name: moation-web
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Publiczny adres API. NEXT_PUBLIC_* jest wstrzykiwany przy BUDOWANIU
      # frontendu i działa w przeglądarce, więc musi to być publiczny adres
      # (https://<usługa>.onrender.com) — NIE `fromService property: host`,
      # bo to zwraca wewnętrzną nazwę `moation-api`, której przeglądarka nie
      # rozwiązuje (ERR_NAME_NOT_RESOLVED). Jeśli zmienisz nazwę usługi API,
      # zaktualizuj też ten adres.
      - key: NEXT_PUBLIC_API_URL
        value: https://moation-api.onrender.com
